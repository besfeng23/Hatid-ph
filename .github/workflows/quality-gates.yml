name: Hatid Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Format Check
        run: npm run format:check --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Unit Tests
        run: npm run test --if-present

      - name: Dependency Audit (advisory; tracked in #22)
        run: |
          echo "::warning title=Temporary advisory dependency audit::npm audit is temporarily non-blocking while the existing vulnerability baseline is remediated in https://github.com/besfeng23/Hatid-ph/issues/22. Restore this step to blocking when issue #22 is resolved."
          npm audit --audit-level=high || true

      - name: Secret Scan Placeholder
        run: |
          echo "Add gitleaks/trufflehog secret scanning here."

      - name: pgTAP Placeholder
        run: |
          echo "Run pgTAP through Supabase local stack once configured."

      - name: Bundle Budget Placeholder
        run: |
          echo "Run bundle-size checks once app packages are configured."
