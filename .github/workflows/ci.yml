name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Full quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high

  database-validation:
    name: Supabase SQL validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Show Supabase CLI version
        run: supabase --version

      - name: Start disposable local Supabase stack
        run: |
          # GitHub-hosted Ubuntu runners include Docker. Supabase CLI uses Docker
          # here to run a disposable local Postgres/Supabase stack only; this job
          # does not link to a hosted Supabase project or read production secrets.
          # Use the current CLI and ignore non-database service health checks so
          # SQL validation is not blocked by transient local service boot issues.
          set -euo pipefail

          docker info
          docker compose version
          supabase stop --no-backup || true
          docker system prune -af --volumes || true

          for attempt in 1 2 3; do
            if supabase start --ignore-health-check; then
              supabase status || true
              exit 0
            fi

            echo "Supabase local stack failed to start on attempt ${attempt}."
            supabase status || true
            docker ps -a || true
            docker logs supabase_db_hatid-ph-local || true
            supabase stop --no-backup || true
            docker system prune -af --volumes || true
            sleep 15
          done

          echo "Supabase local stack failed to start after 3 attempts."
          exit 1

      - name: Apply migrations to local database
        run: supabase db reset --local

      - name: Run Supabase SQL tests
        run: npm run db:test
