name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Full quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high

  database-validation:
    name: Supabase SQL validation
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    env:
      PGHOST: 127.0.0.1
      PGPORT: 54322
      PGDATABASE: postgres
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap Supabase-compatible database roles
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          create schema if not exists extensions;
          create extension if not exists pgcrypto with schema extensions;
          create schema if not exists auth;

          do $block$ begin create role anon nologin; exception when duplicate_object then null; end $block$;
          do $block$ begin create role authenticated nologin; exception when duplicate_object then null; end $block$;
          do $block$ begin create role service_role nologin bypassrls; exception when duplicate_object then null; end $block$;

          create table if not exists auth.users (
            id uuid primary key default extensions.gen_random_uuid(),
            email text,
            created_at timestamptz not null default now()
          );

          create or replace function auth.uid()
          returns uuid
          language sql
          stable
          as $fn$
            select nullif(current_setting('request.jwt.claim.sub', true), '')::uuid
          $fn$;

          create or replace function auth.jwt()
          returns jsonb
          language sql
          stable
          as $fn$
            select coalesce(
              nullif(current_setting('request.jwt.claims', true), '')::jsonb,
              '{}'::jsonb
            )
          $fn$;
          SQL

      - name: Apply migrations to local database
        run: |
          set -euo pipefail
          for migration in supabase/migrations/*.sql; do
            echo "Applying ${migration}"
            psql -v ON_ERROR_STOP=1 -f "${migration}"
          done

      - name: Validate trip timeline database contract
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          do $validation$
          declare
            v_rider_user_id uuid := '00000000-0000-4000-8000-000000000101';
            v_driver_user_id uuid := '00000000-0000-4000-8000-000000000201';
            v_other_driver_user_id uuid := '00000000-0000-4000-8000-000000000202';
            v_vehicle_id uuid := '00000000-0000-4000-8000-000000000301';
            v_request_id uuid := '00000000-0000-4000-8000-000000000401';
            v_offer_id uuid := '00000000-0000-4000-8000-000000000501';
            v_trip_id uuid;
            v_replayed_trip_id uuid;
            v_count integer;
          begin
            if to_regclass('trip.trip_events') is null then
              raise exception 'missing trip.trip_events table';
            end if;

            if not exists (
              select 1 from information_schema.columns
              where table_schema = 'trip'
                and table_name = 'trip_events'
                and column_name in ('trip_id', 'actor_user_id', 'event_type', 'trip_status', 'occurred_at', 'created_at')
              group by table_schema, table_name
              having count(*) = 6
            ) then
              raise exception 'trip.trip_events is missing required safe timeline columns';
            end if;

            if to_regprocedure('trip.prevent_trip_event_mutation()') is null then
              raise exception 'missing trip.prevent_trip_event_mutation trigger function';
            end if;

            if not exists (
              select 1 from pg_trigger
              where tgrelid = 'trip.trip_events'::regclass
                and tgname = 'trip_events_prevent_update'
                and not tgisinternal
            ) then
              raise exception 'missing immutable update trigger on trip.trip_events';
            end if;

            if not exists (
              select 1 from pg_trigger
              where tgrelid = 'trip.trip_events'::regclass
                and tgname = 'trip_events_prevent_delete'
                and not tgisinternal
            ) then
              raise exception 'missing immutable delete trigger on trip.trip_events';
            end if;

            if to_regprocedure('trip.create_trip_from_accepted_offer(uuid)') is null then
              raise exception 'missing trip.create_trip_from_accepted_offer RPC';
            end if;

            if to_regprocedure('dispatch.respond_to_my_trip_offer(uuid,text)') is null then
              raise exception 'missing dispatch.respond_to_my_trip_offer RPC';
            end if;

            if to_regprocedure('trip.advance_my_driver_trip(uuid,text,text)') is null then
              raise exception 'missing trip.advance_my_driver_trip RPC';
            end if;

            if to_regprocedure('trip.get_my_rider_trip_events(uuid)') is null then
              raise exception 'missing trip.get_my_rider_trip_events RPC';
            end if;

            if to_regprocedure('trip.get_my_driver_trip_events(uuid)') is null then
              raise exception 'missing trip.get_my_driver_trip_events RPC';
            end if;

            if has_table_privilege('authenticated', 'trip.trip_events', 'select') then
              raise exception 'authenticated role must not have direct select on trip.trip_events';
            end if;

            insert into auth.users (id, email)
            values (v_rider_user_id, 'rider@example.test'),
                   (v_driver_user_id, 'driver@example.test'),
                   (v_other_driver_user_id, 'other-driver@example.test')
            on conflict (id) do nothing;

            insert into driver.vehicles (id, user_id, plate_number, vehicle_type)
            values (v_vehicle_id, v_driver_user_id, 'HTD1234', 'sedan')
            on conflict (id) do nothing;

            insert into rider.ride_requests (
              id,
              user_id,
              pickup_address_text,
              dropoff_address_text,
              service_type,
              estimate_minor,
              currency,
              status,
              expires_at
            ) values (
              v_request_id,
              v_rider_user_id,
              'Alabang',
              'Makati',
              'standard',
              17000,
              'PHP',
              'requested',
              now() + interval '10 minutes'
            ) on conflict (id) do nothing;

            insert into dispatch.trip_offers (
              id,
              request_id,
              driver_user_id,
              vehicle_id,
              offer_status,
              expires_at
            ) values (
              v_offer_id,
              v_request_id,
              v_driver_user_id,
              v_vehicle_id,
              'offered',
              now() + interval '45 seconds'
            ) on conflict (id) do nothing;

            perform set_config('request.jwt.claim.sub', v_driver_user_id::text, true);
            perform 1 from dispatch.respond_to_my_trip_offer(v_offer_id, 'accepted');

            select trips.id into v_trip_id
            from trip.trips trips
            where trips.accepted_offer_id = v_offer_id;

            if v_trip_id is null then
              raise exception 'accepted offer did not create a trip';
            end if;

            perform 1 from dispatch.respond_to_my_trip_offer(v_offer_id, 'accepted');

            select trips.id into v_replayed_trip_id
            from trip.trips trips
            where trips.accepted_offer_id = v_offer_id;

            if v_replayed_trip_id <> v_trip_id then
              raise exception 'accepted offer replay returned a different trip';
            end if;

            select count(*) into v_count
            from trip.trips trips
            where trips.accepted_offer_id = v_offer_id;

            if v_count <> 1 then
              raise exception 'accepted offer created % trips instead of one', v_count;
            end if;

            select count(*) into v_count
            from trip.trip_events events
            where events.trip_id = v_trip_id
              and events.event_type = 'trip_created';

            if v_count <> 1 then
              raise exception 'accepted offer created % trip_created events instead of one', v_count;
            end if;

            perform set_config('request.jwt.claim.sub', v_other_driver_user_id::text, true);
            begin
              perform 1 from dispatch.respond_to_my_trip_offer(v_offer_id, 'accepted');
              raise exception 'wrong driver was allowed to replay accepted offer';
            exception when sqlstate '22023' then
              null;
            end;
          end
          $validation$;
          SQL
