name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Full quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high

  database-validation:
    name: Supabase SQL validation
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: supabase/postgres:15.8.1.060
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    env:
      PGHOST: 127.0.0.1
      PGPORT: 54322
      PGDATABASE: postgres
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap Supabase-compatible database roles
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          create schema if not exists extensions;
          create extension if not exists pgcrypto with schema extensions;
          create extension if not exists pgtap with schema extensions;
          create schema if not exists auth;

          do $$ begin create role anon nologin; exception when duplicate_object then null; end $$;
          do $$ begin create role authenticated nologin; exception when duplicate_object then null; end $$;
          do $$ begin create role service_role nologin bypassrls; exception when duplicate_object then null; end $$;

          create table if not exists auth.users (
            id uuid primary key default extensions.gen_random_uuid(),
            email text,
            created_at timestamptz not null default now()
          );

          create or replace function auth.uid()
          returns uuid
          language sql
          stable
          as $$
            select nullif(current_setting('request.jwt.claim.sub', true), '')::uuid
          $$;

          create or replace function auth.jwt()
          returns jsonb
          language sql
          stable
          as $$
            select coalesce(
              nullif(current_setting('request.jwt.claims', true), '')::jsonb,
              '{}'::jsonb
            )
          $$;
          SQL

      - name: Apply migrations to local database
        run: |
          set -euo pipefail
          for migration in supabase/migrations/*.sql; do
            echo "Applying ${migration}"
            psql -v ON_ERROR_STOP=1 -f "${migration}"
          done

      - name: Run Supabase SQL tests
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          tests=(supabase/tests/**/*.sql supabase/tests/*.sql)

          if [ ${#tests[@]} -eq 0 ]; then
            echo "No Supabase SQL tests found."
            exit 1
          fi

          for test_file in "${tests[@]}"; do
            echo "Running ${test_file}"
            output="$(psql -v ON_ERROR_STOP=1 -f "${test_file}" 2>&1)" || {
              echo "${output}"
              exit 1
            }
            echo "${output}"
            if echo "${output}" | grep -E "(^|[[:space:]])not ok|Looks like you failed"; then
              exit 1
            fi
          done
